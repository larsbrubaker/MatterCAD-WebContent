name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build help-docs.zip
        run: |
          python3 - <<'PYEOF'
          import os, zipfile

          HELP_ROOT = "docs/Help"

          # Build help-docs.zip containing all .md files from docs/Help/.
          # The app builds the help tree from the zip's directory structure
          # and extracts article titles from YAML frontmatter — no toc.json needed.
          with zipfile.ZipFile("docs/help-docs.zip", "w", zipfile.ZIP_DEFLATED) as zf:
              for root, dirs, files in os.walk(HELP_ROOT):
                  # Sort for deterministic zip ordering
                  dirs.sort()
                  for fname in sorted(files):
                      if fname.endswith(".md"):
                          full_path = os.path.join(root, fname)
                          # Entry path relative to docs/, e.g. "Help/operations/array-linear.md"
                          arc_name = os.path.relpath(full_path, "docs").replace("\\", "/")
                          zf.write(full_path, arc_name)
              print(f"Generated docs/help-docs.zip with {len(zf.namelist())} entries")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
